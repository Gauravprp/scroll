<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Working Gesture Scroll</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      color:#fff;
      font-family:Arial;
      overflow-x:hidden;
    }

    section{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      padding:40px;
    }

    .hero{
      background:linear-gradient(to bottom,#000,#111);
    }

    .dark{
      background:#0a0a0a;
    }

    .gradient{
      background:linear-gradient(135deg,#111,#1b1b1b);
    }

    h1{
      font-size:100px;
      line-height:1;
    }

    h2{
      font-size:70px;
      margin-bottom:20px;
    }

    p{
      max-width:700px;
      color:#999;
      line-height:1.8;
      font-size:20px;
    }

    .status{
      position:fixed;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      padding:14px 24px;
      border-radius:999px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      z-index:9999;
    }

    video{
      position:fixed;
      width:1px;
      height:1px;
      opacity:0;
    }

    .cursor{
      width:30px;
      height:30px;
      border-radius:50%;
      border:2px solid #fff;
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      pointer-events:none;
      z-index:9999;
      transition:
      left 0.03s linear,
      top 0.03s linear;
    }

  </style>
</head>

<body>

<div class="status" id="status">
  Show index finger ☝️
</div>

<div class="cursor" id="cursor"></div>

<video
  id="video"
  autoplay
  playsinline
  muted
></video>

<section class="hero">
  <h1>
    Gesture<br>
    Scroll
  </h1>

  <p style="margin-top:30px;">
    Move your index finger up and down.
  </p>
</section>

<section class="dark">
  <h2>AI Tracking</h2>

  <p>
    This website scrolls using your finger movement.
  </p>
</section>

<section class="gradient">
  <h2>Future UI</h2>

  <p>
    Smooth gesture based interactions directly in browser.
  </p>
</section>

<section class="dark">
  <h2>Touchless Control</h2>

  <p>
    Powered by MediaPipe hand tracking AI.
  </p>
</section>

<script>

const videoElement =
document.getElementById("video");

const statusText =
document.getElementById("status");

const cursor =
document.getElementById("cursor");

// -------------------------------------
// HANDS
// -------------------------------------

const hands = new Hands({

  locateFile:(file)=>{
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }

});

hands.setOptions({

  maxNumHands:1,
  modelComplexity:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7

});

// -------------------------------------
// MAIN
// -------------------------------------

hands.onResults((results)=>{

  if(
    !results.multiHandLandmarks ||
    results.multiHandLandmarks.length === 0
  ){

    statusText.innerText =
    "No hand detected";

    return;
  }

  const landmarks =
  results.multiHandLandmarks[0];

  // INDEX FINGER
  const finger =
  landmarks[8];

  // -------------------------------------
  // CURSOR
  // -------------------------------------

  const x =
  window.innerWidth -
  (finger.x * window.innerWidth);

  const y =
  finger.y * window.innerHeight;

  cursor.style.left = x + "px";
  cursor.style.top = y + "px";

  // -------------------------------------
  // SIMPLE WORKING SCROLL
  // -------------------------------------

  // TOP AREA
  if(finger.y < 0.4){

    statusText.innerText =
    "Scrolling Up ↑";

    // REAL SCROLL
    window.scrollBy(0,-15);
  }

  // BOTTOM AREA
  else if(finger.y > 0.6){

    statusText.innerText =
    "Scrolling Down ↓";

    // REAL SCROLL
    window.scrollBy(0,15);
  }

  // CENTER AREA
  else{

    statusText.innerText =
    "Neutral Zone";
  }

});

// -------------------------------------
// CAMERA
// -------------------------------------

const camera = new Camera(videoElement,{

  onFrame: async ()=>{

    await hands.send({
      image:videoElement
    });

  },

  width:640,
  height:480

});

camera.start();

</script>

</body>
</html>
