<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Gesture Car Game</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      background:#000;
      font-family:Arial, Helvetica, sans-serif;
    }

    canvas{
      display:block;
      background:#111;
    }

    video{
      position:fixed;
      width:1px;
      height:1px;
      opacity:0;
    }

    /* HUD */

    .hud{

      position:fixed;

      top:20px;
      left:50%;

      transform:translateX(-50%);

      z-index:999;

      width:380px;

      padding:18px 24px;

      border-radius:999px;

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(10px);

      color:#fff;

      text-align:center;

      font-size:15px;

      letter-spacing:1px;

    }

    /* SCORE */

    .score{

      position:fixed;

      top:20px;
      right:20px;

      color:#fff;

      z-index:999;

      text-align:right;

    }

    .score div:first-child{

      font-size:30px;
      font-weight:bold;

    }

    .high-score{

      margin-top:10px;

      font-size:20px;

      color:#00bfff;

    }

    /* CONTROLS */

    .controls{

      position:fixed;

      bottom:20px;
      left:50%;

      transform:translateX(-50%);

      color:#aaa;

      font-size:14px;

      z-index:999;
    }

    /* GAME OVER */

    .game-over{

      position:fixed;

      inset:0;

      background:
      rgba(0,0,0,0.82);

      backdrop-filter:blur(10px);

      display:none;

      align-items:center;
      justify-content:center;

      flex-direction:column;

      z-index:99999;

      color:#fff;

    }

    .game-over h1{

      font-size:90px;

      margin-bottom:20px;
    }

    .final-score{

      font-size:32px;

      color:#aaa;

      margin-bottom:15px;
    }

    .final-high{

      font-size:24px;

      color:#00bfff;

      margin-bottom:40px;
    }

    .retry-btn{

      padding:18px 50px;

      border:none;

      border-radius:999px;

      font-size:20px;

      cursor:pointer;

      background:
      linear-gradient(
        90deg,
        #0066ff,
        #00bfff
      );

      color:#fff;

      transition:0.2s ease;

      box-shadow:
      0 0 30px rgba(0,102,255,0.4);

    }

    .retry-btn:hover{

      transform:scale(1.06);

    }

  </style>
</head>

<body>

<div class="hud" id="hud">
  ✊ Close hand to drive
</div>

<div class="score">

  <div id="score">
    Score: 0
  </div>

  <div
    class="high-score"
    id="highScore"
  >
    High: 0
  </div>

</div>

<div class="controls">
  ✋ Open Palm = Pause | ✊ Closed Hand = Drive
</div>

<!-- GAME OVER -->

<div
  class="game-over"
  id="gameOverScreen"
>

  <h1>
    GAME OVER
  </h1>

  <div
    class="final-score"
    id="finalScore"
  >
    Score: 0
  </div>

  <div
    class="final-high"
    id="finalHigh"
  >
    High Score: 0
  </div>

  <button
    class="retry-btn"
    onclick="restartGame()"
  >
    Retry
  </button>

</div>

<video
  id="video"
  autoplay
  playsinline
  muted
></video>

<canvas id="game"></canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

const hud =
document.getElementById("hud");

const scoreText =
document.getElementById("score");

const highScoreText =
document.getElementById("highScore");

const gameOverScreen =
document.getElementById("gameOverScreen");

const finalScore =
document.getElementById("finalScore");

const finalHigh =
document.getElementById("finalHigh");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

// --------------------------------------
// HIGH SCORE
// --------------------------------------

let highScore =
localStorage.getItem(
  "gestureCarHighScore"
) || 0;

highScoreText.innerText =
"High: " + highScore;

// --------------------------------------
// GAME STATE
// --------------------------------------

let score = 0;

let gameOver = false;

let gamePaused = true;

let handX = 0.5;

let gameSpeed = 3;

let speedIncrease = 0.002;

let roadOffset = 0;

// --------------------------------------
// PLAYER
// --------------------------------------

const player = {

  x:
  canvas.width / 2 - 35,

  y:
  canvas.height - 180,

  width:70,
  height:120

};

// --------------------------------------
// OBSTACLES
// --------------------------------------

let obstacles = [];

// --------------------------------------
// CREATE OBSTACLE
// --------------------------------------

function createObstacle(){

  if(gamePaused || gameOver) return;

  const width = 70;
  const height = 120;

  const lane =
  Math.floor(Math.random() * 5);

  const laneWidth =
  canvas.width / 5;

  obstacles.push({

    x:
    lane * laneWidth +
    laneWidth / 2 -
    width / 2,

    y:-150,

    width,
    height,

    speed:
    gameSpeed + Math.random() * 2

  });

}

// --------------------------------------
// SPAWN LOOP
// --------------------------------------

setInterval(()=>{

  createObstacle();

},1000);

// --------------------------------------
// GAME OVER
// --------------------------------------

function triggerGameOver(){

  gameOver = true;

  gamePaused = true;

  hud.innerText =
  "💀 Game Over";

  finalScore.innerText =
  "Score: " + score;

  finalHigh.innerText =
  "High Score: " + highScore;

  gameOverScreen.style.display =
  "flex";

}

// --------------------------------------
// RESTART
// --------------------------------------

function restartGame(){

  score = 0;

  scoreText.innerText =
  "Score: 0";

  gameOver = false;

  gamePaused = true;

  gameSpeed = 3;

  roadOffset = 0;

  obstacles = [];

  player.x =
  canvas.width / 2 - 35;

  gameOverScreen.style.display =
  "none";

  hud.innerText =
  "✊ Close hand to drive";

}

// --------------------------------------
// HANDS
// --------------------------------------

const videoElement =
document.getElementById("video");

const hands = new Hands({

  locateFile:(file)=>{
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }

});

hands.setOptions({

  maxNumHands:1,
  modelComplexity:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7

});

// --------------------------------------
// HAND TRACKING
// --------------------------------------

hands.onResults((results)=>{

  if(gameOver) return;

  if(
    !results.multiHandLandmarks ||
    results.multiHandLandmarks.length === 0
  ){

    hud.innerText =
    "No hand detected";

    gamePaused = true;

    return;
  }

  const landmarks =
  results.multiHandLandmarks[0];

  // fingertips
  const indexTip =
  landmarks[8];

  const middleTip =
  landmarks[12];

  const ringTip =
  landmarks[16];

  const pinkyTip =
  landmarks[20];

  // bases
  const indexBase =
  landmarks[5];

  const middleBase =
  landmarks[9];

  const ringBase =
  landmarks[13];

  const pinkyBase =
  landmarks[17];

  // --------------------------------------
  // OPEN PALM DETECTION
  // --------------------------------------

  const openPalm =

    indexTip.y < indexBase.y &&
    middleTip.y < middleBase.y &&
    ringTip.y < ringBase.y &&
    pinkyTip.y < pinkyBase.y;

  // --------------------------------------
  // RELIABLE CLOSED HAND
  // --------------------------------------

  const closedHand =

    indexTip.y > middleBase.y &&
    middleTip.y > ringBase.y;

  // --------------------------------------
  // PAUSE
  // --------------------------------------

  if(openPalm){

    gamePaused = true;

    hud.innerText =
    "✋ Game Paused";

    return;
  }

  // --------------------------------------
  // PLAY
  // --------------------------------------

  if(closedHand){

    gamePaused = false;

    handX = indexTip.x;

    if(handX < 0.4){

      hud.innerText =
      "✊ Turning Left ←";

    }

    else if(handX > 0.6){

      hud.innerText =
      "✊ Turning Right →";

    }

    else{

      hud.innerText =
      "✊ Driving Straight ↑";
    }

  }

});

// --------------------------------------
// CAMERA
// --------------------------------------

const camera = new Camera(videoElement,{

  onFrame: async ()=>{

    await hands.send({
      image:videoElement
    });

  },

  width:640,
  height:480

});

camera.start();

// --------------------------------------
// ROAD
// --------------------------------------

function drawRoad(){

  ctx.fillStyle = "#222";

  ctx.fillRect(
    canvas.width * 0.2,
    0,
    canvas.width * 0.6,
    canvas.height
  );

  ctx.strokeStyle = "#fff";

  ctx.lineWidth = 6;

  if(!gamePaused && !gameOver){

    roadOffset += gameSpeed * 2;

  }

  if(roadOffset > 80){
    roadOffset = 0;
  }

  for(let i=1;i<5;i++){

    const x =
    canvas.width * 0.2 +
    (canvas.width * 0.6 / 5) * i;

    for(let y=-80;y<canvas.height;y+=80){

      ctx.beginPath();

      ctx.moveTo(
        x,
        y + roadOffset
      );

      ctx.lineTo(
        x,
        y + 40 + roadOffset
      );

      ctx.stroke();

    }

  }

}

// --------------------------------------
// PLAYER
// --------------------------------------

function drawPlayer(){

  const targetX =
  handX * canvas.width;

  player.x +=
  (targetX - player.x - player.width/2) * 0.08;

  ctx.fillStyle = "#00bfff";

  ctx.fillRect(
    player.x,
    player.y,
    player.width,
    player.height
  );

  ctx.fillStyle = "#bdefff";

  ctx.fillRect(
    player.x + 12,
    player.y + 15,
    46,
    30
  );

}

// --------------------------------------
// OBSTACLES
// --------------------------------------

function drawObstacles(){

  for(let i=0;i<obstacles.length;i++){

    const obs =
    obstacles[i];

    if(!gamePaused && !gameOver){

      obs.y += obs.speed;

    }

    ctx.fillStyle = "#ff3333";

    ctx.fillRect(
      obs.x,
      obs.y,
      obs.width,
      obs.height
    );

    // COLLISION
    if(

      player.x <
      obs.x + obs.width &&

      player.x + player.width >
      obs.x &&

      player.y <
      obs.y + obs.height &&

      player.y + player.height >
      obs.y

    ){

      triggerGameOver();

    }

    // REMOVE
    if(obs.y > canvas.height){

      obstacles.splice(i,1);

      score++;

      scoreText.innerText =
      "Score: " + score;

      // HIGH SCORE
      if(score > highScore){

        highScore = score;

        localStorage.setItem(
          "gestureCarHighScore",
          highScore
        );

        highScoreText.innerText =
        "High: " + highScore;
      }

      i--;
    }

  }

}

// --------------------------------------
// GAME LOOP
// --------------------------------------

function animate(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  drawRoad();

  drawPlayer();

  drawObstacles();

  // SPEED INCREASE
  if(!gamePaused && !gameOver){

    gameSpeed += speedIncrease;

  }

  requestAnimationFrame(animate);
}

animate();

// --------------------------------------
// RESIZE
// --------------------------------------

window.addEventListener("resize",()=>{

  canvas.width =
  window.innerWidth;

  canvas.height =
  window.innerHeight;

});

</script>

</body>
</html>
