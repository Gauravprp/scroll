<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Gesture Car Game</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      background:#000;
      font-family:Arial;
    }

    canvas{
      display:block;
      background:#111;
    }

    video{
      position:fixed;
      width:1px;
      height:1px;
      opacity:0;
    }

    /* UI */

    .hud{

      position:fixed;

      top:20px;
      left:50%;

      transform:translateX(-50%);

      z-index:999;

      width:340px;

      padding:18px 24px;

      border-radius:999px;

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(10px);

      color:#fff;

      text-align:center;

      font-size:15px;

      letter-spacing:1px;

    }

    .score{

      position:fixed;

      top:20px;
      right:20px;

      z-index:999;

      color:#fff;

      font-size:28px;

      font-weight:bold;

    }

    .controls{

      position:fixed;

      bottom:20px;
      left:50%;

      transform:translateX(-50%);

      color:#999;

      font-size:14px;

      z-index:999;
    }

  </style>
</head>

<body>

  <div class="hud" id="hud">
    Show your hand ✋
  </div>

  <div class="score" id="score">
    0
  </div>

  <div class="controls">
    Move hand LEFT / RIGHT to steer
  </div>

  <video
    id="video"
    autoplay
    playsinline
    muted
  ></video>

  <canvas id="game"></canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

const hud =
document.getElementById("hud");

const scoreText =
document.getElementById("score");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

// ------------------------------------
// GAME STATE
// ------------------------------------

let score = 0;
let gameOver = false;

let handX = 0.5;

// ------------------------------------
// PLAYER
// ------------------------------------

const player = {

  x:
  canvas.width / 2 - 35,

  y:
  canvas.height - 180,

  width:70,
  height:120,

  speed:0

};

// ------------------------------------
// OBSTACLES
// ------------------------------------

const obstacles = [];

// create traffic
function createObstacle(){

  const width = 70;
  const height = 120;

  const lane =
  Math.floor(Math.random() * 5);

  const laneWidth =
  canvas.width / 5;

  obstacles.push({

    x:
    lane * laneWidth +
    laneWidth / 2 -
    width / 2,

    y:-150,

    width,
    height,

    speed:
    8 + Math.random() * 5

  });

}

// spawn loop
setInterval(()=>{

  if(!gameOver){
    createObstacle();
  }

},1000);

// ------------------------------------
// MEDIAPIPE
// ------------------------------------

const videoElement =
document.getElementById("video");

const hands = new Hands({

  locateFile:(file)=>{
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }

});

hands.setOptions({

  maxNumHands:1,
  modelComplexity:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7

});

// ------------------------------------
// HAND TRACKING
// ------------------------------------

hands.onResults((results)=>{

  if(
    !results.multiHandLandmarks ||
    results.multiHandLandmarks.length === 0
  ){

    hud.innerText =
    "No hand detected";

    return;
  }

  const landmarks =
  results.multiHandLandmarks[0];

  // index finger
  const finger =
  landmarks[8];

  handX = finger.x;

  // LEFT
  if(handX < 0.4){

    hud.innerText =
    "Turning Left ←";
  }

  // RIGHT
  else if(handX > 0.6){

    hud.innerText =
    "Turning Right →";
  }

  // CENTER
  else{

    hud.innerText =
    "Straight ↑";
  }

});

// ------------------------------------
// CAMERA
// ------------------------------------

const camera = new Camera(videoElement,{

  onFrame: async ()=>{

    await hands.send({
      image:videoElement
    });

  },

  width:640,
  height:480

});

camera.start();

// ------------------------------------
// DRAW ROAD
// ------------------------------------

let roadOffset = 0;

function drawRoad(){

  // road
  ctx.fillStyle = "#222";

  ctx.fillRect(
    canvas.width * 0.2,
    0,
    canvas.width * 0.6,
    canvas.height
  );

  // lane lines
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 6;

  roadOffset += 20;

  if(roadOffset > 80){
    roadOffset = 0;
  }

  for(let i=1;i<5;i++){

    const x =
    canvas.width * 0.2 +
    (canvas.width * 0.6 / 5) * i;

    for(let y=-80;y<canvas.height;y+=80){

      ctx.beginPath();

      ctx.moveTo(
        x,
        y + roadOffset
      );

      ctx.lineTo(
        x,
        y + 40 + roadOffset
      );

      ctx.stroke();

    }

  }

}

// ------------------------------------
// DRAW PLAYER
// ------------------------------------

function drawPlayer(){

  // smooth steering
  const targetX =
  handX * canvas.width;

  player.x +=
  (targetX - player.x - player.width/2) * 0.08;

  // car body
  ctx.fillStyle = "#00bfff";

  ctx.fillRect(
    player.x,
    player.y,
    player.width,
    player.height
  );

  // windshield
  ctx.fillStyle = "#bdefff";

  ctx.fillRect(
    player.x + 12,
    player.y + 15,
    46,
    30
  );

}

// ------------------------------------
// DRAW OBSTACLES
// ------------------------------------

function drawObstacles(){

  for(let i=0;i<obstacles.length;i++){

    const obs =
    obstacles[i];

    obs.y += obs.speed;

    // obstacle car
    ctx.fillStyle = "#ff3333";

    ctx.fillRect(
      obs.x,
      obs.y,
      obs.width,
      obs.height
    );

    // collision
    if(

      player.x <
      obs.x + obs.width &&

      player.x + player.width >
      obs.x &&

      player.y <
      obs.y + obs.height &&

      player.y + player.height >
      obs.y

    ){

      gameOver = true;

      hud.innerText =
      "Game Over 💀";

    }

    // remove
    if(obs.y > canvas.height){

      obstacles.splice(i,1);

      score++;

      scoreText.innerText =
      score;

      i--;
    }

  }

}

// ------------------------------------
// GAME LOOP
// ------------------------------------

function animate(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  drawRoad();

  if(!gameOver){

    drawPlayer();

    drawObstacles();

  }else{

    ctx.fillStyle = "#fff";

    ctx.font = "70px Arial";

    ctx.textAlign = "center";

    ctx.fillText(

      "GAME OVER",

      canvas.width / 2,

      canvas.height / 2

    );

  }

  requestAnimationFrame(animate);
}

animate();

// ------------------------------------
// RESIZE
// ------------------------------------

window.addEventListener("resize",()=>{

  canvas.width =
  window.innerWidth;

  canvas.height =
  window.innerHeight;

});

</script>

</body>
</html>
