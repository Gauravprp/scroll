<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Gesture UI</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
      overflow-x:hidden;
    }

    section{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      padding:40px;
      position:relative;
    }

    .hero{
      background:
      radial-gradient(circle at top,#222,#000 60%);
    }

    .dark{
      background:#080808;
    }

    .gradient{
      background:
      linear-gradient(135deg,#111,#1b1b1b);
    }

    h1{
      font-size:100px;
      line-height:1;
    }

    h2{
      font-size:70px;
      margin-bottom:20px;
    }

    p{
      max-width:700px;
      color:#999;
      line-height:1.8;
      font-size:20px;
    }

    video{
      position:fixed;
      width:1px;
      height:1px;
      opacity:0;
    }

    /* STATUS */

    .status{

      position:fixed;

      top:20px;
      left:50%;

      transform:translateX(-50%);

      width:320px;
      height:60px;

      border-radius:999px;

      overflow:hidden;

      background:
      rgba(255,255,255,0.06);

      border:
      1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(10px);

      z-index:9999;

    }

    .status-fill{

      position:absolute;

      left:0;
      top:0;

      width:0%;
      height:100%;

      background:
      linear-gradient(
        90deg,
        #0066ff,
        #00bfff
      );

      transition:
      width 0.08s linear;

      opacity:0.4;

    }

    .status-text{

      position:relative;

      z-index:2;

      width:100%;
      height:100%;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:15px;
      letter-spacing:1px;

    }

    /* CURSOR */

    .cursor{

      width:32px;
      height:32px;

      border-radius:50%;

      border:2px solid #fff;

      position:fixed;

      left:50%;
      top:50%;

      transform:translate(-50%,-50%);

      pointer-events:none;

      z-index:99999;

      transition:
      left 0.03s linear,
      top 0.03s linear,
      transform 0.1s ease;

      box-shadow:
      0 0 25px rgba(255,255,255,0.5);

    }

    .cursor.active{
      transform:
      translate(-50%,-50%)
      scale(1.8);

      background:#fff;
    }

    /* BUTTON */

    .air-button{

      margin-top:40px;

      padding:20px 50px;

      border-radius:999px;

      border:none;

      font-size:20px;

      cursor:pointer;

      background:
      linear-gradient(
        90deg,
        #0066ff,
        #00bfff
      );

      color:#fff;

      transition:
      transform 0.2s ease,
      box-shadow 0.2s ease;

      box-shadow:
      0 0 30px rgba(0,102,255,0.3);

    }

    .air-button.hover{

      transform:scale(1.08);

      box-shadow:
      0 0 40px rgba(0,102,255,0.7);

    }

  </style>
</head>

<body>

  <!-- STATUS -->
  <div class="status">

    <div
      class="status-fill"
      id="statusFill"
    ></div>

    <div
      class="status-text"
      id="statusText"
    >
      Show index finger ☝️
    </div>

  </div>

  <!-- CURSOR -->
  <div
    class="cursor"
    id="cursor"
  ></div>

  <!-- VIDEO -->
  <video
    id="video"
    autoplay
    playsinline
    muted
  ></video>

  <!-- HERO -->
  <section class="hero">

    <h1>
      Gesture<br>
      Control
    </h1>

    <p style="margin-top:30px;">
      Use only your index finger and thumb.
    </p>

    <button
      class="air-button"
      id="airButton"
    >
      Open Google
    </button>

  </section>

  <!-- SECTION -->
  <section class="dark">

    <h2>Air Click</h2>

    <p>
      Pinch your index finger and thumb together to click.
    </p>

  </section>

  <!-- SECTION -->
  <section class="gradient">

    <h2>Touchless UI</h2>

    <p>
      Scroll and interact without touching screen.
    </p>

  </section>

<script>

const videoElement =
document.getElementById("video");

const statusText =
document.getElementById("statusText");

const statusFill =
document.getElementById("statusFill");

const cursor =
document.getElementById("cursor");

const airButton =
document.getElementById("airButton");

// -------------------------------------
// SCROLL SETTINGS
// -------------------------------------

const SCROLL_PER_FRAME =
(window.innerHeight / 2) / 60;

let scrollDirection = 0;

// -------------------------------------
// SCROLL ENGINE
// -------------------------------------

function animateScroll(){

  if(scrollDirection !== 0){

    window.scrollBy({
      top:
      SCROLL_PER_FRAME * scrollDirection,
      behavior:"auto"
    });

  }

  requestAnimationFrame(animateScroll);
}

animateScroll();

// -------------------------------------
// HANDS
// -------------------------------------

const hands = new Hands({

  locateFile:(file)=>{
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }

});

hands.setOptions({

  maxNumHands:1,
  modelComplexity:1,
  minDetectionConfidence:0.75,
  minTrackingConfidence:0.75

});

// -------------------------------------
// CLICK STATE
// -------------------------------------

let clickLock = false;

// -------------------------------------
// MAIN
// -------------------------------------

hands.onResults((results)=>{

  // NO HAND
  if(
    !results.multiHandLandmarks ||
    results.multiHandLandmarks.length === 0
  ){

    statusText.innerText =
    "No hand detected";

    statusFill.style.width = "0%";

    scrollDirection = 0;

    return;
  }

  const landmarks =
  results.multiHandLandmarks[0];

  // -------------------------------------
  // INDEX FINGER TIP
  // -------------------------------------

  const indexFinger =
  landmarks[8];

  // -------------------------------------
  // THUMB TIP
  // -------------------------------------

  const thumbTip =
  landmarks[4];

  // -------------------------------------
  // IGNORE OTHER FINGERS
  // -------------------------------------

  const middleFinger =
  landmarks[12];

  const ringFinger =
  landmarks[16];

  const pinkyFinger =
  landmarks[20];

  const onlyIndexVisible =

    middleFinger.y > indexFinger.y &&
    ringFinger.y > indexFinger.y &&
    pinkyFinger.y > indexFinger.y;

  if(!onlyIndexVisible){

    statusText.innerText =
    "Use only index finger ☝️";

    scrollDirection = 0;

    return;
  }

  // -------------------------------------
  // CURSOR
  // -------------------------------------

  const x =
  window.innerWidth -
  (indexFinger.x * window.innerWidth);

  const y =
  indexFinger.y * window.innerHeight;

  cursor.style.left = x + "px";
  cursor.style.top = y + "px";

  // -------------------------------------
  // SCROLL
  // -------------------------------------

  if(indexFinger.y < 0.45){

    scrollDirection = -1;

    const intensity =
    ((0.45 - indexFinger.y) / 0.45) * 100;

    statusText.innerText =
    "Scrolling Up ↑";

    statusFill.style.width =
    intensity + "%";
  }

  else if(indexFinger.y > 0.55){

    scrollDirection = 1;

    const intensity =
    ((indexFinger.y - 0.55) / 0.45) * 100;

    statusText.innerText =
    "Scrolling Down ↓";

    statusFill.style.width =
    intensity + "%";
  }

  else{

    scrollDirection = 0;

    statusText.innerText =
    "Neutral Zone";

    statusFill.style.width = "0%";
  }

  // -------------------------------------
  // AIR CLICK
  // -------------------------------------

  const pinchDistance = Math.hypot(
    thumbTip.x - indexFinger.x,
    thumbTip.y - indexFinger.y
  );

  // button collision
  const rect =
  airButton.getBoundingClientRect();

  const hovering =

    x > rect.left &&
    x < rect.right &&
    y > rect.top &&
    y < rect.bottom;

  if(hovering){

    airButton.classList.add("hover");

  }else{

    airButton.classList.remove("hover");
  }

  // pinch click
  if(
    pinchDistance < 0.05 &&
    hovering &&
    !clickLock
  ){

    clickLock = true;

    cursor.classList.add("active");

    statusText.innerText =
    "Air Click 👆";

    setTimeout(()=>{

      window.location.href =
      "https://google.com";

    },200);

  }

  // release
  if(pinchDistance > 0.07){

    clickLock = false;

    cursor.classList.remove("active");
  }

});

// -------------------------------------
// CAMERA
// -------------------------------------

const camera = new Camera(videoElement,{

  onFrame: async ()=>{

    await hands.send({
      image:videoElement
    });

  },

  width:640,
  height:480

});

camera.start();

</script>

</body>
</html>
