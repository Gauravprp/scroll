<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Smooth Gesture Scroll</title>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
      overflow-x:hidden;
    }

    section{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      padding:40px;
    }

    .hero{
      background:
      radial-gradient(circle at top,#222,#000 60%);
    }

    .dark{
      background:#080808;
    }

    .gradient{
      background:
      linear-gradient(135deg,#111,#1b1b1b);
    }

    h1{
      font-size:100px;
      line-height:1;
    }

    h2{
      font-size:70px;
      margin-bottom:20px;
    }

    p{
      max-width:700px;
      color:#999;
      line-height:1.8;
      font-size:20px;
    }

    video{
      position:fixed;
      width:1px;
      height:1px;
      opacity:0;
    }

    /* STATUS */

    .status{

      position:fixed;

      top:20px;
      left:50%;

      transform:translateX(-50%);

      width:300px;
      height:60px;

      border-radius:999px;

      overflow:hidden;

      background:
      rgba(255,255,255,0.06);

      border:
      1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(10px);

      z-index:9999;

    }

    .status-fill{

      position:absolute;

      left:0;
      top:0;

      width:0%;
      height:100%;

      background:
      linear-gradient(
        90deg,
        #0066ff,
        #00bfff
      );

      transition:
      width 0.08s linear,
      opacity 0.08s linear;

      opacity:0.3;

    }

    .status-text{

      position:relative;

      z-index:2;

      width:100%;
      height:100%;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:15px;
      letter-spacing:1px;

    }

    /* CURSOR */

    .cursor{

      width:30px;
      height:30px;

      border-radius:50%;

      border:2px solid #fff;

      position:fixed;

      left:50%;
      top:50%;

      transform:translate(-50%,-50%);

      pointer-events:none;

      z-index:9999;

      transition:
      left 0.03s linear,
      top 0.03s linear;

      box-shadow:
      0 0 20px rgba(255,255,255,0.5);

    }

  </style>
</head>

<body>

  <!-- STATUS -->
  <div class="status">

    <div
      class="status-fill"
      id="statusFill"
    ></div>

    <div
      class="status-text"
      id="statusText"
    >
      Show index finger ☝️
    </div>

  </div>

  <!-- CURSOR -->
  <div
    class="cursor"
    id="cursor"
  ></div>

  <!-- VIDEO -->
  <video
    id="video"
    autoplay
    playsinline
    muted
  ></video>

  <!-- HERO -->
  <section class="hero">

    <h1>
      Gesture<br>
      Scroll
    </h1>

    <p style="margin-top:30px;">
      Hold finger up or down to scroll smoothly.
    </p>

  </section>

  <!-- SECTION -->
  <section class="dark">

    <h2>AI Tracking</h2>

    <p>
      Smooth browser-based hand tracking experience.
    </p>

  </section>

  <!-- SECTION -->
  <section class="gradient">

    <h2>Touchless UI</h2>

    <p>
      Scroll the website using air gestures.
    </p>

  </section>

  <!-- SECTION -->
  <section class="dark">

    <h2>Future Experience</h2>

    <p>
      Powered by MediaPipe AI tracking.
    </p>

  </section>

<script>

const videoElement =
document.getElementById("video");

const statusText =
document.getElementById("statusText");

const statusFill =
document.getElementById("statusFill");

const cursor =
document.getElementById("cursor");

// -------------------------------------
// TARGET:
// 1 second = half screen scroll
// -------------------------------------

const SCROLL_PER_FRAME =
(window.innerHeight / 2) / 60;

// -------------------------------------
// SCROLL STATE
// -------------------------------------

let scrollDirection = 0;

// -------------------------------------
// SMOOTH ENGINE
// -------------------------------------

function animateScroll(){

  if(scrollDirection !== 0){

    window.scrollBy({
      top:
      SCROLL_PER_FRAME * scrollDirection,
      behavior:"auto"
    });

  }

  requestAnimationFrame(animateScroll);
}

animateScroll();

// -------------------------------------
// HANDS
// -------------------------------------

const hands = new Hands({

  locateFile:(file)=>{
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }

});

hands.setOptions({

  maxNumHands:1,
  modelComplexity:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7

});

// -------------------------------------
// MAIN
// -------------------------------------

hands.onResults((results)=>{

  // NO HAND
  if(
    !results.multiHandLandmarks ||
    results.multiHandLandmarks.length === 0
  ){

    statusText.innerText =
    "No hand detected";

    statusFill.style.width = "0%";

    scrollDirection = 0;

    return;
  }

  const landmarks =
  results.multiHandLandmarks[0];

  // INDEX FINGER
  const finger =
  landmarks[8];

  // -------------------------------------
  // CURSOR
  // -------------------------------------

  const x =
  window.innerWidth -
  (finger.x * window.innerWidth);

  const y =
  finger.y * window.innerHeight;

  cursor.style.left = x + "px";
  cursor.style.top = y + "px";

  // -------------------------------------
  // SCROLL ZONES
  // -------------------------------------

  // TOP
  if(finger.y < 0.45){

    scrollDirection = -1;

    const intensity =
    ((0.45 - finger.y) / 0.45) * 100;

    statusText.innerText =
    "Scrolling Up ↑";

    statusFill.style.width =
    intensity + "%";

    statusFill.style.opacity =
    0.5 + (intensity / 100);

  }

  // BOTTOM
  else if(finger.y > 0.55){

    scrollDirection = 1;

    const intensity =
    ((finger.y - 0.55) / 0.45) * 100;

    statusText.innerText =
    "Scrolling Down ↓";

    statusFill.style.width =
    intensity + "%";

    statusFill.style.opacity =
    0.5 + (intensity / 100);

  }

  // CENTER
  else{

    scrollDirection = 0;

    statusText.innerText =
    "Neutral Zone";

    statusFill.style.width = "0%";

  }

});

// -------------------------------------
// CAMERA
// -------------------------------------

const camera = new Camera(videoElement,{

  onFrame: async ()=>{

    await hands.send({
      image:videoElement
    });

  },

  width:640,
  height:480

});

camera.start();

</script>

</body>
</html>
